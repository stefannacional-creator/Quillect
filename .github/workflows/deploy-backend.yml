name: Deploy Backend to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Supabase client
        run: pip install supabase

      - name: Provision Supabase bucket and table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'EOF'
          import os, json
          import urllib.request
          from supabase import create_client

          bucket = os.environ["SUPABASE_STORAGE_BUCKET"]
          client = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])

          # Create bucket (private) — skip if already exists
          try:
              client.storage.create_bucket(bucket, options={"public": False})
              print(f"Bucket '{bucket}' created.")
          except Exception as e:
              print(f"Bucket already exists or skipped: {e}")

          # Create table + index via Supabase Management API (no direct DB connection needed)
          sql = """
          CREATE TABLE IF NOT EXISTS documents (
              id              uuid primary key default gen_random_uuid(),
              user_id         uuid,
              title           text not null,
              document_type   text not null,
              topic           text not null,
              style           text not null default 'professional',
              file_name       text not null unique,
              storage_url     text not null,
              file_size       integer not null,
              created_at      timestamptz not null default now()
          );
          CREATE INDEX IF NOT EXISTS documents_user_id_idx ON documents(user_id);
          """

          ref = os.environ["SUPABASE_PROJECT_REF"]
          token = os.environ["SUPABASE_ACCESS_TOKEN"]
          url = f"https://api.supabase.com/v1/projects/{ref}/database/query"
          payload = json.dumps({"query": sql}).encode()
          req = urllib.request.Request(url, data=payload, headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          })
          with urllib.request.urlopen(req) as resp:
              print("Table provisioned:", resp.status)
          EOF

      - name: Trigger Render Deploy
        run: |
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
